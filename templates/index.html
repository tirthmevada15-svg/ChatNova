<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ChatNova</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body {
    background-color: #050816;
    color: white;
}

/* FIXED BACKGROUND (no click blocking) */
body::before {
    content: "";
    position: fixed;
    inset: 0;
    background-image:
        linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
}
</style>

</head>

<body class="flex h-screen overflow-hidden">

<!-- SIDEBAR -->
<div id="sidebar"
class="w-64 bg-[#0a0f1f] p-4 flex flex-col hidden md:flex relative z-10">

    <button onclick="createChat()" 
    class="bg-gradient-to-r from-blue-500 to-purple-600 p-2 rounded mb-4">
        + New Chat
    </button>

    <div id="chat-list" class="flex-1 overflow-y-auto space-y-2 text-sm"></div>

    <div class="mt-auto pt-4 border-t border-white/10">
        <button onclick="logoutUser()" class="text-red-400 w-full py-2">
            Logout
        </button>
    </div>

</div>

<!-- MAIN -->
<div class="flex-1 flex flex-col h-full relative z-10">

    <!-- MOBILE TOP BAR -->
    <div class="md:hidden flex items-center justify-between p-3 border-b border-white/10">
        <button onclick="toggleSidebar()">☰</button>
        <span>ChatNova</span>
    </div>

    <!-- HERO -->
    <div id="hero" class="flex-1 flex items-center justify-center px-4 text-center relative z-10">
        <div class="max-w-xl w-full">

            <h1 class="text-3xl md:text-4xl font-bold mb-3">ChatNova AI</h1>
            <p class="text-gray-400 mb-6">Ask anything. Learn everything.</p>

            <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">

                <button onclick="quickMsg('Explain AI')"
                class="p-3 bg-white/5 rounded text-left hover:bg-white/10">
                    🧠 Explain AI
                </button>

                <button onclick="quickMsg('Business plan')"
                class="p-3 bg-white/5 rounded text-left hover:bg-white/10">
                    📊 Business Plan
                </button>

                <button onclick="quickMsg('Website copy')"
                class="p-3 bg-white/5 rounded text-left hover:bg-white/10">
                    🌐 Website Copy
                </button>

                <button onclick="quickMsg('Reel ideas')"
                class="p-3 bg-white/5 rounded text-left hover:bg-white/10">
                    🎥 Reel Ideas
                </button>

            </div>

        </div>
    </div>

    <!-- CHAT -->
    <div id="chat-box"
    class="flex-1 overflow-y-auto px-4 md:px-6 hidden relative z-10">

        <div id="chat-inner"
        class="max-w-3xl mx-auto w-full space-y-4 py-6"></div>

    </div>

    <!-- INPUT -->
    <div class="border-t border-white/10 px-4 md:px-6 py-3 relative z-10">

        <div class="max-w-3xl mx-auto w-full flex bg-white/5 rounded-xl px-4 py-3">

            <input id="msg"
            class="flex-1 bg-transparent outline-none text-white"
            placeholder="Ask ChatNova...">

            <button onclick="sendMsg()" 
            class="ml-3 px-4 py-2 bg-blue-600 rounded">
                Send
            </button>

        </div>

    </div>

</div>

<script src="/static/script.js"></script>

<script>
function toggleSidebar(){
    document.getElementById("sidebar").classList.toggle("hidden");
}

function logoutUser(){
    window.location.href = "/logout";
}
</script>

</body>
</html>
