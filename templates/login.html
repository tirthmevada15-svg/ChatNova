<!DOCTYPE html>
<html>
<head>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#020617] flex items-center justify-center h-screen">

<form method="POST" class="bg-white/5 p-8 rounded-xl w-80">
<h2 class="text-white text-xl mb-4">Login</h2>

<input name="email" placeholder="Email" class="w-full mb-3 p-2 bg-gray-800 text-white">
<input name="password" type="password" placeholder="Password" class="w-full mb-3 p-2 bg-gray-800 text-white">

<button class="w-full bg-blue-600 py-2 rounded">Login</button>

<p class="text-gray-400 mt-3 text-sm">
No account? <a href="/signup" class="text-blue-400">Signup</a>
</p>
</form>

</body>
</html>
