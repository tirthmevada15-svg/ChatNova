<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - ChatNova</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body {
    background: #050816;
    color: white;
    font-family: sans-serif;
}

body::before {
    content:"";
    position:fixed;
    inset:0;
    background-image:
        linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
    background-size:40px 40px;
    pointer-events:none;
}
</style>
</head>

<body class="flex items-center justify-center min-h-screen px-4">

<div class="w-full max-w-md bg-white/5 backdrop-blur-xl p-6 rounded-2xl border border-white/10">

    <!-- LOGO -->
    <div class="text-center mb-6">
        <h1 class="text-2xl font-bold">⚡ ChatNova</h1>
        <p class="text-gray-400 text-sm">Login to your account</p>
    </div>

    <!-- FORM -->
    <form method="POST" class="space-y-4">

        <input name="email" type="email" required placeholder="Email"
        class="w-full p-3 rounded-lg bg-white/10 outline-none focus:ring-2 focus:ring-blue-500">

        <input name="password" type="password" required placeholder="Password"
        class="w-full p-3 rounded-lg bg-white/10 outline-none focus:ring-2 focus:ring-blue-500">

        <button type="submit"
        class="w-full bg-gradient-to-r from-blue-500 to-purple-600 py-3 rounded-lg hover:opacity-90">
            Login
        </button>

    </form>

    <!-- SWITCH -->
    <p class="text-center text-sm mt-4 text-gray-400">
        Don’t have an account?
        <a href="/signup" class="text-blue-400">Sign up</a>
    </p>

</div>

</body>
</html>
