<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login • ChatNova</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-br from-[#020617] via-[#0f172a] to-[#020617] min-h-screen flex items-center justify-center">

<div class="w-full max-w-md p-8 rounded-2xl bg-white/5 backdrop-blur-xl border border-white/10">

    <h1 class="text-3xl text-white font-bold text-center mb-2">ChatNova</h1>
    <p class="text-gray-400 text-center mb-6">Welcome back</p>

    <form method="POST" class="space-y-4">

        <input name="email" type="email" required placeholder="Email"
            class="w-full p-3 rounded-lg bg-white/10 text-white placeholder-gray-400">

        <input name="password" type="password" required placeholder="Password"
            class="w-full p-3 rounded-lg bg-white/10 text-white placeholder-gray-400">

        <button class="w-full bg-blue-600 py-2 rounded-lg hover:bg-blue-700">
            Login
        </button>

    </form>

    <p class="text-center text-gray-400 mt-4 text-sm">
        Don’t have an account?
        <a href="/signup" class="text-blue-400">Signup</a>
    </p>

</div>

</body>
</html>
